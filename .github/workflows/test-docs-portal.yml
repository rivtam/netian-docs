name: Test Docs Portal

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # ─── Detect Changes ───────────────────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      auth: ${{ steps.filter.outputs.auth }}
      docusaurus: ${{ steps.filter.outputs.docusaurus }}
      database: ${{ steps.filter.outputs.database }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            auth:
              - 'auth-service/**'
            docusaurus:
              - 'docusaurus/**'
            database:
              - 'database/**'

  # ─── Test Auth Service ────────────────────────────────────────────────────
  test-auth:
    needs: changes
    if: needs.changes.outputs.auth == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: auth-service/package-lock.json

      - name: Install dependencies
        run: |
          cd auth-service
          npm ci

      - name: Run linter
        run: |
          cd auth-service
          npm run lint || echo "No lint script found"

      - name: Run tests
        run: |
          cd auth-service
          npm test || echo "No tests configured yet"

      - name: Build auth service
        run: |
          cd auth-service
          docker build -t docs-portal-auth:test .

  # ─── Test Docusaurus Build ────────────────────────────────────────────────
  test-docusaurus:
    needs: changes
    if: needs.changes.outputs.docusaurus == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: docusaurus/package-lock.json

      - name: Install dependencies
        run: |
          cd docusaurus
          npm ci

      - name: Build Docusaurus
        run: |
          cd docusaurus
          npm run build

      - name: Check for MDX errors
        run: |
          cd docusaurus
          if [ -d "build" ]; then
            echo "✅ Docusaurus build successful"
          else
            echo "❌ Docusaurus build failed"
            exit 1
          fi

  # ─── Test Database Migrations ─────────────────────────────────────────────
  test-database:
    needs: changes
    if: needs.changes.outputs.database == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: docs_portal_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install migration dependencies
        run: |
          cd database/migrations
          npm ci

      - name: Run database migrations
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: docs_portal_test
          DB_USER: postgres
          DB_PASSWORD: test_password
        run: |
          cd database/migrations
          node migrate.js

      - name: Verify tables created
        run: |
          docker exec $(docker ps -q -f ancestor=postgres:16) \
            psql -U postgres -d docs_portal_test -c "\dt"

  # ─── Integration Test - Full Stack ────────────────────────────────────────
  integration-test:
    runs-on: ubuntu-latest
    needs: [test-auth, test-docusaurus, test-database]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Create .env file for testing
        run: |
          cp .env.example .env
          sed -i 's/changeme/test_password/g' .env

      - name: Start services with docker-compose
        run: |
          docker compose up -d

      - name: Wait for services to be healthy
        run: |
          timeout 120 bash -c 'until docker compose ps | grep -q "healthy"; do sleep 2; done'

      - name: Test auth service health
        run: |
          curl -f http://localhost:4000/health || \
          curl -f http://localhost:4000/api/health || \
          echo "⚠️  Auth service health check endpoint not configured"

      - name: Test docs portal
        run: |
          curl -f http://localhost:3000 || exit 1

      - name: Show service status
        run: |
          docker compose ps

      - name: Show logs on failure
        if: failure()
        run: |
          echo "=== Auth Service Logs ==="
          docker compose logs auth
          echo "=== Docs Portal Logs ==="
          docker compose logs docs

      - name: Cleanup
        if: always()
        run: |
          docker compose down -v
